<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Tool</title>
    <meta property="og:title" content="Discord Tool · exclamando/discord_tool">
    <meta property="og:description" content="Beta rn, but this shi is working decent.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/exclamando/discord_tool/main/discord_tool.png">
    <meta property="og:image" content="https://raw.githubusercontent.com/exclamando/discord_tool/main/discord_tool.png">
    <meta name="theme-color" content="#2b2d31">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            color: white;
            overflow: hidden;
            cursor: url('cursor.gif'), auto;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('snow.gif');
            background-repeat: repeat;
            opacity: 0.6;
            z-index: 0;
            pointer-events: none;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1;
        }

        h1 {
            font-size: 5rem;
            text-transform: uppercase;
            color: white;
            letter-spacing: 5px;
            z-index: 2;
            position: relative;
            text-shadow: 
                0 0 5px #ffffff,
                0 0 10px #ffffff,
                0 0 20px #ffffff,
                0 0 40px #bf00ff,
                0 0 80px #bf00ff,
                0 0 100px #bf00ff,
                0 0 150px #bf00ff;
        }
    </style>
</head>
<body>
    <h1>Welcome</h1>
    <script src="main.js"></script>
</body>
</html>
