<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Tool</title>
    <meta property="og:title" content="Discord Tool · exclamando/discord_tool">
    <meta property="og:description" content="Beta rn, but this shi is working decent.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/exclamando/discord_tool/main/discord_tool.png">
    <meta property="og:image" content="https://raw.githubusercontent.com/exclamando/discord_tool/main/discord_tool.png">
    <meta name="theme-color" content="#2b2d31">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif; 
            background-color: #0a0a0a; 
            
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7); 
            z-index: -1;
        }

        h1 {
            font-size: 5rem; 
            text-transform: uppercase;
            color: #fff; 
            letter-spacing: 5px;
            
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #fff,
                0 0 40px #00ffff,
                0 0 80px #00ffff,
                0 0 90px #00ffff,
                0 0 100px #00ffff,
                0 0 150px #00ffff;
            
            animation: flicker 1.5s infinite alternate;
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                opacity: 1;
                text-shadow: 
                    0 0 5px #fff,
                    0 0 10px #fff,
                    0 0 20px #fff,
                    0 0 40px #00ffff,
                    0 0 80px #00ffff,
                    0 0 90px #00ffff,
                    0 0 100px #00ffff,
                    0 0 150px #00ffff;
            }
            20%, 22%, 24%, 55% {
                opacity: 0.8;
                text-shadow: none;
            }
        }
    </style>
</head>
<body>
    <h1>Welcome</h1>
    <script src="main.js"></script>
</body>
</html>
